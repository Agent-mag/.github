name: Bug Report
description: Report a bug in an Agent Mag tool
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using?
      placeholder: e.g., 1.2.0
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g., 22.x
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., macOS 15, Ubuntu 24.04
